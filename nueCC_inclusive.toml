[parameters]
photon_threshold = 25.0
electron_threshold = 225.0
muon_threshold = 25.0
pion_threshold = 25.0
proton_threshold = 50.0
trackLength_threshold = 190.0
electron_dedx = 3.625
flash_low_t = 0.0
flash_high_t = 9.6
vertex_threshold = 3.25
electron_softmax = 0.72
primary_softmax = 0.97
electron_id = 1.0
greater_than = 1.0

[general]
output = "output_nueCCInclusive"
primfn = "default_primary_classification"
pidfn = "default_pid"
fsthresh = [
    "@photon_threshold",
    "@electron_threshold",
    "@muon_threshold",
    "@pion_threshold",
    "@proton_threshold",
    "@vertex_threshold",
    "@electron_softmax",
    "@primary_softmax",
    "@flash_low_t",
    "@flash_high_t",
    "@greater_than",
]

