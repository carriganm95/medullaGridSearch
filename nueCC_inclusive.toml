    { name = "no_muons",                  parameters = [ "@muon_threshold" ] },
    { name = "containment_cut" },
    { name = "leading_ele_energy_cut",    parameters = [ "@electron_threshold" ] },

]

[[category]] # 1 : electron neutrino CC events, w/ electron, but non-fiducial or non-contained
cuts = [
    { name = "neutrino"        },
    { name = "iscc"            },
    { name = "neutrino_pdg",          parameters = [ 12.0, -12.0 ] },
    { name = "has_particle_multiplicity", parameters = [ 1, 1 ] },
]

[[category]] # 2 : Muon neutrino CC events, fiducial and contained
cuts = [
    { name = "neutrino"        },
    { name = "fiducial_cut"    },
    { name = "iscc"            },
    { name = "neutrino_pdg",          parameters = [ 14.0, -14.0 ] },
    { name = "containment_cut" },
]

[[category]] # 3 : Out of fiducial volume and uncontained neutrino events
cuts = [
    { name = "neutrino"        },
    { name = "iscc"}
]

[[category]] # 4 : Neutral current events, fiducial and contained
cuts = [
    { name = "neutrino"        },
    { name = "!iscc"            },
]

[[category]] # 5 : Cosmic events
cuts = [
    { name = "!neutrino"        },
]

[[category]] # 6 : Other ?
